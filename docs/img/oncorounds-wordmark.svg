<?xml version="1.0" encoding="UTF-8"?>
<svg width="380" height="80" viewBox="0 0 380 80" xmlns="http://www.w3.org/2000/svg">
  <title>OncoRounds Wordmark</title>
  
  <!-- Icon: Three stacked rings -->
  <g transform="translate(40, 40)">
    <!-- Round 1: Dashed (bottom) -->
    <circle cx="0" cy="14" r="22" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
    
    <!-- Round 2: Semi-solid (middle) -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-dasharray="14 3"/>
    
    <!-- Round 3: Solid (top) -->
    <circle cx="0" cy="-14" r="22" fill="none" stroke="#1e3a5a" stroke-width="3"/>
    
    <!-- Decision point -->
    <circle cx="22" cy="-14" r="4" fill="#f59e0b"/>
  </g>
  
  <!-- Text: OncoRounds -->
  <text x="85" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="600" fill="#1e293b" letter-spacing="1">
    <tspan fill="#0d9488">Onco</tspan><tspan fill="#64748b">Rounds</tspan>
  </text>
  
</svg>
