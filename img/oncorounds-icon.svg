<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>OncoRounds Icon</title>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  
  <!-- Three rings - simplified for icon size -->
  <!-- Round 1: Dashed (bottom) -->
  <circle cx="32" cy="40" r="14" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>
  
  <!-- Round 2: Semi-solid (middle) -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-dasharray="10 2"/>
  
  <!-- Round 3: Solid (top) -->
  <circle cx="32" cy="24" r="14" fill="none" stroke="#f8fafc" stroke-width="3"/>
  
  <!-- Decision point -->
  <circle cx="46" cy="24" r="3" fill="#f59e0b"/>
  
</svg>
