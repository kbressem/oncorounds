<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <title>OncoRounds - Clinical Reasoning Benchmark for Oncology AI</title>
  <desc>Logo representing three clinical rounds: Emergency (dashed, uncertain), Workup (emerging clarity), Definitive (solid confidence)</desc>
  
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Round 1: Emergency - Dashed ring (uncertainty, limited data) -->
  <circle 
    cx="200" 
    cy="250" 
    r="70" 
    fill="none" 
    stroke="#94a3b8" 
    stroke-width="3"
    stroke-dasharray="12 8"
    opacity="0.85"
  />
  <circle cx="270" cy="250" r="5" fill="#94a3b8"/>
  
  <!-- Round 2: Workup - Semi-solid ring (emerging clarity) -->
  <circle 
    cx="200" 
    cy="195" 
    r="70" 
    fill="none" 
    stroke="#0d9488" 
    stroke-width="4"
    stroke-dasharray="40 6"
    opacity="0.95"
  />
  <circle cx="270" cy="195" r="6" fill="#0d9488"/>
  
  <!-- Round 3: Definitive - Solid ring (confident diagnosis) -->
  <circle 
    cx="200" 
    cy="140" 
    r="70" 
    fill="none" 
    stroke="url(#ringGradient)" 
    stroke-width="5"
  />
  <circle cx="270" cy="140" r="7" fill="#f59e0b"/>
  
  <!-- Connecting line showing progression -->
  <line 
    x1="270" y1="245" 
    x2="270" y2="147" 
    stroke="#e2e8f0" 
    stroke-width="1.5"
    stroke-dasharray="3 3"
  />
  
  <!-- Treatment direction arrow -->
  <path 
    d="M270 115 L265 125 L275 125 Z" 
    fill="#f59e0b"
  />
  
</svg>
